name: Monthly broker base image update and create PR

on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      DOCKERFILE: broker/Dockerfile
      IMAGE: library/eclipse-mosquitto
      # Only bump within this major version. The 2.x line still supports the
      # `password_file`/`acl_file` options used in broker/mosquitto/config;
      # these are removed in 3.0, so bumping across majors needs a manual review.
      MAJOR: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Determine current and latest broker image tag
        id: versions
        run: |
          set -euo pipefail

          current="$(grep -oP 'FROM\s+eclipse-mosquitto:\K\S+' "$DOCKERFILE")"
          echo "Current tag: $current"

          # Fetch all tags from Docker Hub (paginated) and keep only
          # "<major>.<minor>.<patch>-alpine" tags for the pinned major version.
          url="https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100"
          while [ -n "$url" ] && [ "$url" != "null" ]; do
            resp="$(curl -fsSL "$url")"
            echo "$resp" | jq -r '.results[].name' \
              | grep -E "^${MAJOR}\.[0-9]+\.[0-9]+-alpine$" >> all_tags.txt || true
            url="$(echo "$resp" | jq -r '.next')"
          done

          latest="$(sed 's/-alpine$//' all_tags.txt \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -n1)-alpine"
          echo "Latest tag: $latest"

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile
        if: steps.versions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          sed -i "s|FROM eclipse-mosquitto:${{ steps.versions.outputs.current }}|FROM eclipse-mosquitto:${{ steps.versions.outputs.latest }}|" "$DOCKERFILE"
          grep 'FROM eclipse-mosquitto' "$DOCKERFILE"

      - name: Create Pull Request
        if: steps.versions.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: "GHA: Bump broker to mosquitto ${{ steps.versions.outputs.latest }}"
          title: "GHA: Bump broker to mosquitto ${{ steps.versions.outputs.latest }}"
          body: |
            Automated update of the broker base image.

            - Image: `eclipse-mosquitto`
            - From: `${{ steps.versions.outputs.current }}`
            - To: `${{ steps.versions.outputs.latest }}`

            Constrained to the `${{ env.MAJOR }}.x` line to preserve support for the
            `password_file`/`acl_file` options used by the broker config. Bumping
            across majors (e.g. to 3.0) requires a manual migration.

            Please verify the broker starts correctly before merging.

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: broker-base-image-update
          labels: automated-pr
          delete-branch: true
