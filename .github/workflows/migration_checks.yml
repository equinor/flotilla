name: Migration checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  migration_checks:
    uses: equinor/armada/.github/workflows/migration_checks.yml@main
    with:
      database_paths: "backend/api/Database/**"
      migrations_paths: "backend/api/Migrations/**"
